<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURO·STREAM v4.8 · GPT-4o Stable</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700&display=swap');

        :root {
            --accent: #007bff;
            --gpt-blue: #74aa9c;
            --bg: #030305;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; overflow-x: hidden; }

        .app-shell {
            max-width: 850px; width: 100%; background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(40px); border: 1px solid var(--border);
            border-radius: 40px; padding: 35px; box-shadow: 0 50px 120px rgba(0,0,0,0.9);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.8rem; background: linear-gradient(90deg, #fff, var(--gpt-blue)); -webkit-background-clip: text; color: transparent; }

        .controls { display: flex; gap: 12px; margin-bottom: 20px; }
        input { flex: 1; background: rgba(0,0,0,0.6); border: 1px solid var(--border); color: #fff; padding: 18px 24px; border-radius: 20px; outline: none; font-size: 1rem; }
        
        .btn-launch { background: linear-gradient(45deg, var(--accent), var(--gpt-blue)); border: none; color: #fff; font-weight: 800; padding: 0 45px; border-radius: 20px; cursor: pointer; transition: 0.4s; }
        .btn-launch:hover { transform: scale(1.03); box-shadow: 0 0 40px rgba(0, 123, 255, 0.4); }

        .chat-display { background: rgba(0,0,0,0.4); height: 420px; border-radius: 28px; padding: 22px; overflow-y: auto; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }

        .message { padding: 15px 22px; border-radius: 22px; background: rgba(255,255,255,0.03); font-size: 0.98rem; line-height: 1.6; border-left: 4px solid var(--accent); animation: slideIn 0.3s ease-out; }
        .message.ai { border-left-color: var(--gpt-blue); background: rgba(116, 170, 156, 0.05); }
        .message.err { border-left-color: #ff3366; background: rgba(255, 51, 102, 0.05); color: #ffb3b3; }
        .message b { color: var(--accent); margin-right: 10px; }
        .message.ai b { color: var(--gpt-blue); }

        .footer { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: #555; }
        .status-pill { display: flex; align-items: center; gap: 8px; background: var(--glass); padding: 7px 18px; border-radius: 100px; border: 1px solid var(--border); }
        .led { width: 9px; height: 9px; border-radius: 50%; background: #222; }
        .led.on { background: var(--gpt-blue); box-shadow: 0 0 15px var(--gpt-blue); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">
        <div class="logo">◈ GPT-4o·FIX</div>
        <div class="status-pill">
            <div id="led" class="led"></div>
            <span id="stTxt" style="font-weight: 700;">READY</span>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="chInp" placeholder="Ник канала Twitch..." spellcheck="false">
        <button id="startBtn" class="btn-launch">СТАРТ</button>
    </div>

    <div id="chatBox" class="chat-display"></div>

    <div class="footer">
        <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="ttsOn" checked> Озвучка активна
        </label>
        <span>Model: <b style="color:var(--gpt-blue)">GPT-4o Stable</b></span>
    </div>
</div>

<script>
    (function() {
        let ws = null, audio = false, channel = "", lastAI = false;
        const btn = document.getElementById('startBtn'),
              chInp = document.getElementById('chInp'),
              chat = document.getElementById('chatBox'),
              led = document.getElementById('led'),
              stTxt = document.getElementById('stTxt');

        function addMsg(user, text, type = "") {
            const div = document.createElement('div');
            div.className = 'message ' + type;
            div.innerHTML = type === 'sys' ? text : `<b>${user}</b> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            if (chat.childNodes.length > 50) chat.removeChild(chat.firstChild);
        }

        function speak(text, isAI = false) {
            if (!audio || !document.getElementById('ttsOn').checked) return;
            if (isAI) window.speechSynthesis.cancel();
            else if (window.speechSynthesis.speaking && lastAI) return;
            const utter = new SpeechSynthesisUtterance(text.replace(/(https?:\/\/[^\s]+)/g, '').replace(/[^\p{L}\p{N}\s.,!?]/gu, ''));
            utter.lang = 'ru-RU'; lastAI = isAI;
            window.speechSynthesis.speak(utter);
        }

        async function fetchAI(q) {
            // Создаем контроллер для отмены запроса через 15 секунд
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);

            try {
                // Добавляем случайный seed для обхода кэша и ускорения ответа
                const seed = Math.floor(Math.random() * 1000000);
                const url = `https://text.pollinations.ai/${encodeURIComponent(q)}?model=openai&system=Кратко_на_русском&seed=${seed}`;
                
                const res = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);

                if (!res.ok) throw new Error("Server Error");
                
                const text = await res.text();
                if (text.startsWith('{')) return "Ошибка формата данных сервера.";
                return text.trim() || "ИИ не смог сформулировать ответ.";

            } catch(e) {
                if (e.name === 'AbortError') return "Тайм-аут: сервер ИИ слишком долго не отвечал.";
                return "Ошибка связи с нейросетью. Попробуйте еще раз.";
            }
        }

        function connect() {
            if (!channel) return;
            if (ws) { ws.onclose = null; ws.close(); }
            ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

            ws.onopen = () => {
                ws.send(`PASS SCHMOOPIIE`);
                ws.send(`NICK justinfan${Math.floor(Math.random() * 99999)}`);
                ws.send(`JOIN #${channel}`);
                led.className = 'led on'; 
                stTxt.textContent = `LIVE: ${channel.toUpperCase()}`;
                addMsg('', `📡 Протокол GPT-4o запущен для #${channel}`, 'sys');
            };

            ws.onmessage = async (e) => {
                if (e.data.startsWith('PING')) { ws.send('PONG :tmi.twitch.tv'); return; }
                const m = e.data.match(/:(\w+)!.*PRIVMSG #\w+ :(.*)/);
                if (m) {
                    const u = m[1], msg = m[2].trim();
                    addMsg(u, msg);
                    if (msg.toLowerCase().startsWith('!ai')) {
                        const q = msg.slice(3).trim();
                        if (q) {
                            addMsg('🤖 GPT-4o', '⚡ Анализ...', 'ai');
                            const ans = await fetchAI(q);
                            
                            // Проверяем, не возникла ли ошибка
                            const isErr = ans.includes("Ошибка") || ans.includes("Тайм-аут");
                            chat.lastChild.className = "message " + (isErr ? "err" : "ai");
                            chat.lastChild.innerHTML = `<b>🤖 GPT-4o</b> ${ans}`;
                            
                            if (!isErr) speak(ans, true);
                        }
                    } else { speak(msg, false); }
                }
            };

            ws.onclose = () => {
                led.className = 'led'; stTxt.textContent = 'RECONNECT...';
                setTimeout(connect, 1000);
            };
        }

        btn.addEventListener('click', () => {
            const ch = chInp.value.trim().toLowerCase();
            if (ch) {
                channel = ch; audio = true;
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
                connect();
            }
        });
        chInp.addEventListener('keypress', (e) => e.key === 'Enter' && btn.click());
    })();
</script>
</body>
</html>
