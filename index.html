<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch NeuroTTS · Final</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #09090b; color: #efeff1; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .app { max-width: 850px; width: 100%; background: #18181b; border: 1px solid #27272a; border-radius: 20px; padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; }
        .logo { font-weight: 800; font-size: 1.5rem; background: linear-gradient(90deg, #9147ff, #00ffcc); -webkit-background-clip: text; color: transparent; }
        
        .control-panel { display: flex; gap: 10px; background: #09090b; padding: 5px; border-radius: 50px; border: 1px solid #3f3f46; }
        input { background: transparent; border: none; color: #fff; padding: 8px 20px; outline: none; width: 180px; font-size: 1rem; }
        button { background: #9147ff; border: none; color: white; padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #772ce8; transform: scale(1.02); }

        .status-badge { display: flex; align-items: center; gap: 8px; background: #232329; padding: 10px 20px; border-radius: 50px; font-size: 0.85rem; }
        .led { width: 10px; height: 10px; border-radius: 50%; background: #444; transition: 0.1s; }
        .led.on { background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }
        .led.re { background: #ff4444; box-shadow: 0 0 10px #ff4444; }

        .chat-window { background: #0a0a0c; height: 420px; border-radius: 18px; padding: 15px; overflow-y: auto; border: 1px solid #2f2f3a; margin: 15px 0; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 12px; background: #1f1f23; font-size: 0.95rem; border-left: 4px solid #9147ff; animation: fadeIn 0.2s ease; }
        .msg.ai { border-left-color: #00ffcc; background: #132a24; color: #e0f2fe; }
        .msg b { color: #bf94ff; margin-right: 5px; }
        .msg.ai b { color: #00ffcc; }
        .msg.sys { border: none; background: transparent; color: #666; font-size: 0.8rem; font-style: italic; padding: 0 5px; }

        .config { display: flex; gap: 20px; font-size: 0.9rem; color: #888; margin-bottom: 5px; }
        input[type="checkbox"] { accent-color: #9147ff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="logo">◈ NEURO·IRC</div>
        <div class="status-badge">
            <div id="led" class="led"></div>
            <span id="stTxt">ОФЛАЙН</span>
        </div>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <div class="control-panel">
            <input type="text" id="chInput" placeholder="Ник канала..." spellcheck="false">
            <button id="startBtn">ЗАПУСК</button>
        </div>
    </div>

    <div class="config">
        <label><input type="checkbox" id="ttsChat" checked> Озвучка чата</label>
        <label><input type="checkbox" id="ttsAI" checked> Озвучка ИИ (!ai)</label>
    </div>

    <div id="chatBox" class="chat-window"></div>
    
    <div style="font-size: 0.7rem; color: #444; text-align: right;">Llama 3.1 8B Instruct · Zero-Lib WebSocket</div>
</div>

<script>
    (function() {
        // --- ВАШИ ДАННЫЕ ---
        const OR_KEY = "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";
        const AI_MODEL = "meta-llama/llama-3.1-8b-instruct:free";

        let ws = null;
        let audioActive = false;
        let currentChannel = "";
        let lastSpeechWasAI = false;

        const btn = document.getElementById('startBtn');
        const input = document.getElementById('chInput');
        const chat = document.getElementById('chatBox');
        const led = document.getElementById('led');
        const stTxt = document.getElementById('stTxt');

        function addMsg(user, text, type = "") {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerHTML = type === 'sys' ? text : `<b>${user}:</b> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            if (chat.childNodes.length > 100) chat.removeChild(chat.firstChild);
        }

        function speak(text, isAI = false) {
            if (!audioActive) return;
            if (isAI && !document.getElementById('ttsAI').checked) return;
            if (!isAI && !document.getElementById('ttsChat').checked) return;

            if (isAI) window.speechSynthesis.cancel();
            else if (window.speechSynthesis.speaking && lastSpeechWasAI) return;

            const cleanText = text.replace(/(https?:\/\/[^\s]+)/g, 'ссылка').replace(/[^\p{L}\p{N}\s.,!?]/gu, '');
            const utter = new SpeechSynthesisUtterance(cleanText);
            utter.lang = 'ru-RU';
            lastSpeechWasAI = isAI;
            window.speechSynthesis.speak(utter);
        }

        async function fetchAI(question) {
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OR_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: AI_MODEL,
                        messages: [
                            { role: "system", content: "Ты краткий ассистент на стриме. Отвечай на русском, весело, максимум 2 предложения." },
                            { role: "user", content: question }
                        ]
                    })
                });
                const data = await response.json();
                if (data.error) return "Ошибка: " + data.error.message;
                return data.choices[0].message.content.trim();
            } catch (e) {
                return "Ошибка сети при запросе к ИИ.";
            }
        }

        function connect() {
            if (!currentChannel) return;
            if (ws) { ws.onclose = null; ws.close(); }

            ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

            ws.onopen = () => {
                ws.send(`PASS SCHMOOPIIE`);
                ws.send(`NICK justinfan${Math.floor(Math.random() * 99999)}`);
                ws.send(`JOIN #${currentChannel}`);
                led.className = 'led on';
                stTxt.textContent = `В СЕТИ: ${currentChannel}`;
                addMsg('', `📡 Соединение с #${currentChannel} установлено`, 'sys');
            };

            ws.onmessage = async (event) => {
                const data = event.data;
                if (data.startsWith('PING')) { ws.send('PONG :tmi.twitch.tv'); return; }

                const match = data.match(/:(\w+)!.*PRIVMSG #\w+ :(.*)/);
                if (match) {
                    const user = match[1], msg = match[2].trim();
                    addMsg(user, msg);

                    if (msg.toLowerCase().startsWith('!ai')) {
                        const q = msg.slice(3).trim();
                        if (q) {
                            addMsg('🤖 AI', '⚡ Обработка...', 'ai');
                            const ans = await fetchAI(q);
                            if (chat.lastElementChild && chat.lastElementChild.classList.contains('ai')) {
                                chat.lastElementChild.innerHTML = `<b>🤖 AI:</b> ${ans}`;
                            }
                            speak(ans, true);
                        }
                    } else {
                        speak(msg, false);
                    }
                }
            };

            ws.onclose = () => {
                led.className = 'led re';
                stTxt.textContent = 'РЕКОННЕКТ...';
                setTimeout(connect, 100);
            };
            ws.onerror = () => ws.close();
        }

        btn.addEventListener('click', () => {
            const val = input.value.trim().toLowerCase();
            if (val) {
                currentChannel = val;
                audioActive = true;
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
                connect();
            }
        });

        input.addEventListener('keypress', (e) => e.key === 'Enter' && btn.click());
    })();
</script>

</body>
</html>
