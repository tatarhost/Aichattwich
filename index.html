<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch AI · Gemma Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #09090b; color: #efeff1; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .app-container { max-width: 850px; width: 100%; background: #18181b; border: 1px solid #27272a; border-radius: 20px; padding: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .logo { font-weight: 800; font-size: 1.5rem; background: linear-gradient(90deg, #4285f4, #34a853); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .controls { display: flex; background: #09090b; padding: 4px; border-radius: 50px; border: 1px solid #3f3f46; }
        input { background: transparent; border: none; color: #fff; padding: 8px 16px; outline: none; width: 160px; font-size: 0.95rem; }
        button { background: #4285f4; border: none; color: white; padding: 8px 22px; border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { background: #357abd; }
        .status-box { display: flex; align-items: center; gap: 10px; background: #27272a; padding: 8px 16px; border-radius: 50px; font-size: 0.85rem; }
        .led { width: 10px; height: 10px; border-radius: 50%; background: #52525b; transition: 0.2s; }
        .led.on { background: #34a853; box-shadow: 0 0 10px #34a853; }
        .led.re { background: #ea4335; box-shadow: 0 0 10px #ea4335; }
        .chat-area { background: #09090b; height: 400px; border-radius: 16px; padding: 16px; overflow-y: auto; border: 1px solid #27272a; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 12px; background: #27272a; font-size: 0.95rem; line-height: 1.5; border-left: 4px solid #4285f4; animation: fadeIn 0.2s ease; }
        .msg.ai { border-left-color: #34a853; background: #132a24; }
        .msg b { color: #8ab4f8; margin-right: 5px; }
        .msg.ai b { color: #34a853; }
        .msg.sys { background: transparent; border: none; color: #71717a; font-size: 0.8rem; }
        .settings { display: flex; gap: 20px; font-size: 0.9rem; color: #a1a1aa; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo">◈ GEMINI·FREE</div>
        <div class="controls">
            <input type="text" id="chInput" placeholder="Ник канала..." spellcheck="false">
            <button id="startBtn">СТАРТ</button>
        </div>
        <div class="status-box">
            <div id="led" class="led"></div>
            <span id="stTxt">ОФЛАЙН</span>
        </div>
    </div>

    <div class="settings">
        <label><input type="checkbox" id="useChat" checked> Озвучка чата</label>
        <label><input type="checkbox" id="useAI" checked> Озвучка ИИ (!ai)</label>
    </div>

    <div id="chatBox" class="chat-area"></div>
</div>

<script>
    (function() {
        // ПАРАМЕТРЫ
        const OR_KEY = "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";
        const AI_MODEL = "google/gemma-2-9b-it:free"; // Актуальная бесплатная модель

        let ws = null;
        let audioActive = false;
        let currentChannel = "";
        let lastSpeechWasAI = false;

        const btn = document.getElementById('startBtn');
        const input = document.getElementById('chInput');
        const chat = document.getElementById('chatBox');
        const led = document.getElementById('led');
        const stTxt = document.getElementById('stTxt');

        function addMsg(user, text, type = "") {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerHTML = type === 'sys' ? text : `<b>${user}:</b> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            if (chat.childNodes.length > 100) chat.removeChild(chat.firstChild);
        }

        function speak(text, isAI = false) {
            if (!audioActive) return;
            if (isAI && !document.getElementById('useAI').checked) return;
            if (!isAI && !document.getElementById('useChat').checked) return;

            if (isAI) window.speechSynthesis.cancel();
            else if (window.speechSynthesis.speaking && lastSpeechWasAI) return;

            const cleanText = text.replace(/(https?:\/\/[^\s]+)/g, 'ссылка').replace(/[^\p{L}\p{N}\s.,!?]/gu, '');
            const utter = new SpeechSynthesisUtterance(cleanText);
            utter.lang = 'ru-RU';
            lastSpeechWasAI = isAI;
            window.speechSynthesis.speak(utter);
        }

        async function fetchAI(question) {
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OR_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: AI_MODEL,
                        messages: [
                            { role: "system", content: "Ты краткий ассистент на стриме. Отвечай на русском, до 20 слов." },
                            { role: "user", content: question }
                        ]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    return `Ошибка API: ${data.error.message}`;
                }

                return data.choices[0].message.content.trim();
            } catch (e) {
                return "Ошибка сети. Проверь консоль.";
            }
        }

        function connect() {
            if (!currentChannel) return;
            if (ws) { ws.onclose = null; ws.close(); }

            ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

            ws.onopen = () => {
                ws.send(`PASS SCHMOOPIIE`);
                ws.send(`NICK justinfan${Math.floor(Math.random() * 99999)}`);
                ws.send(`JOIN #${currentChannel}`);
                led.className = 'led on';
                stTxt.textContent = `LIVE: ${currentChannel}`;
            };

            ws.onmessage = async (event) => {
                const data = event.data;
                if (data.startsWith('PING')) { ws.send('PONG :tmi.twitch.tv'); return; }

                const match = data.match(/:(\w+)!.*PRIVMSG #\w+ :(.*)/);
                if (match) {
                    const user = match[1];
                    const msg = match[2].trim();
                    addMsg(user, msg);

                    if (msg.toLowerCase().startsWith('!ai')) {
                        const q = msg.slice(3).trim();
                        if (q) {
                            addMsg('🤖 AI', '⚡ Думаю...', 'ai');
                            const ans = await fetchAI(q);
                            
                            if (chat.lastElementChild && chat.lastElementChild.classList.contains('ai')) {
                                chat.lastElementChild.innerHTML = `<b>🤖 AI:</b> ${ans}`;
                            }
                            speak(ans, true);
                        }
                    } else {
                        speak(msg, false);
                    }
                }
            };

            ws.onclose = () => {
                led.className = 'led re';
                stTxt.textContent = 'RECONNECT...';
                setTimeout(connect, 100);
            };
            ws.onerror = () => ws.close();
        }

        btn.addEventListener('click', () => {
            const val = input.value.trim().toLowerCase();
            if (val) {
                currentChannel = val;
                audioActive = true;
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
                addMsg('', `📡 Вход в #${val}...`, 'sys');
                connect();
            }
        });

        input.addEventListener('keypress', (e) => e.key === 'Enter' && btn.click());
    })();
</script>

</body>
</html>
