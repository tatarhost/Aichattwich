<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURO·STREAM v2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap');

        :root {
            --bg: #050507;
            --accent: #9147ff;
            --ai-accent: #00ffcc;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #1a1033 0%, #050507 100%);
            color: #efeff1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Фоновое свечение */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent);
            filter: blur(150px);
            opacity: 0.15;
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        .app-container {
            max-width: 900px;
            width: 100%;
            background: rgba(15, 15, 20, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-box {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--glass);
            padding: 8px 16px;
            border-radius: 100px;
            border: 1px solid var(--border);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
            box-shadow: 0 0 0px transparent;
            transition: 0.3s;
        }
        .led.on { background: var(--ai-accent); box-shadow: 0 0 15px var(--ai-accent); }
        .led.re { background: #ff4466; box-shadow: 0 0 15px #ff4466; }

        /* Кнопки получения ключа */
        .resource-hub {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            align-items: center;
            border: 1px solid var(--border);
        }

        .hub-label { font-size: 0.7rem; color: #666; font-weight: 700; width: 80px; }

        .btn-link {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8rem;
            color: #fff;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-tg { background: #0088cc; box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3); }
        .btn-max { background: #ff4500; box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3); }
        .btn-link:hover { transform: translateY(-2px); filter: brightness(1.2); }

        /* Панель ввода */
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 2fr auto;
            gap: 12px;
            margin-bottom: 20px;
        }

        input {
            background: var(--glass);
            border: 1px solid var(--border);
            color: #fff;
            padding: 14px 20px;
            border-radius: 16px;
            outline: none;
            font-size: 0.95rem;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.05); }

        .start-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .start-btn:hover { box-shadow: 0 0 20px var(--accent); transform: scale(1.02); }

        /* Чат */
        .chat-area {
            background: rgba(0,0,0,0.3);
            height: 380px;
            border-radius: 24px;
            padding: 20px;
            overflow-y: auto;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .msg {
            padding: 12px 18px;
            border-radius: 18px;
            background: rgba(255,255,255,0.03);
            font-size: 0.95rem;
            line-height: 1.5;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            animation: fadeIn 0.3s ease;
        }

        .msg.ai {
            background: linear-gradient(135deg, rgba(0, 255, 204, 0.1), rgba(0, 255, 204, 0.02));
            border-left: 4px solid var(--ai-accent);
        }

        .msg b { color: var(--accent); margin-right: 8px; font-weight: 600; }
        .msg.ai b { color: var(--ai-accent); }
        .msg.sys { background: transparent; color: #555; border: none; font-size: 0.8rem; text-align: center; }

        /* Настройки */
        .settings {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #888;
            transition: 0.3s;
        }
        .toggle:hover { color: #fff; }
        .toggle input { width: auto; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo">◈ NEURO·STREAM</div>
        <div class="status-box">
            <div id="led" class="led"></div>
            <span id="stTxt">ОФЛАЙН</span>
        </div>
    </div>

    <!-- Ресурс хаб -->
    <div class="resource-hub">
        <div class="hub-label">ПОЛУЧИТЬ КЛЮЧ:</div>
        <a href="https://t.me/+A9oqctCZC582ZmZl" target="_blank" class="btn-link btn-tg">Telegram Channel</a>
        <a href="https://max.ru/join/CLu9tJrFtmWQMFQ5Q3Yk5IcL_ElITI-dqusm4bsUa6g" target="_blank" class="btn-link btn-max">Max.ru Join</a>
    </div>

    <div class="controls-grid">
        <input type="text" id="chInput" placeholder="Канал Twitch" spellcheck="false">
        <input type="password" id="keyInput" placeholder="Вставьте OpenRouter ключ здесь..." spellcheck="false">
        <button id="startBtn" class="start-btn">СТАРТ</button>
    </div>

    <div id="chatBox" class="chat-area"></div>

    <div class="settings">
        <label class="toggle"><input type="checkbox" id="ttsChat" checked> Озвучка чата</label>
        <label class="toggle"><input type="checkbox" id="ttsAI" checked> Озвучка ИИ (!ai)</label>
    </div>
</div>

<script>
    (function() {
        let ws = null;
        let audioActive = false;
        let currentChannel = "";
        let lastAiSpeech = false;

        const btn = document.getElementById('startBtn');
        const chInput = document.getElementById('chInput');
        const keyInput = document.getElementById('keyInput');
        const chat = document.getElementById('chatBox');
        const led = document.getElementById('led');
        const stTxt = document.getElementById('stTxt');

        // Сохранение ключа в браузере для удобства
        keyInput.value = localStorage.getItem('_or_key') || '';

        function addMsg(user, text, type = "") {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerHTML = type === 'sys' ? text : `<b>${user}</b> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            if (chat.childNodes.length > 50) chat.removeChild(chat.firstChild);
        }

        function speak(text, isAI = false) {
            if (!audioActive) return;
            if (isAI && !document.getElementById('ttsAI').checked) return;
            if (!isAI && !document.getElementById('ttsChat').checked) return;

            if (isAI) window.speechSynthesis.cancel();
            else if (window.speechSynthesis.speaking && lastAiSpeech) return;

            const clean = text.replace(/(https?:\/\/[^\s]+)/g, 'ссылка').replace(/[^\p{L}\p{N}\s.,!?]/gu, '');
            const utter = new SpeechSynthesisUtterance(clean);
            utter.lang = 'ru-RU';
            lastAiSpeech = isAI;
            window.speechSynthesis.speak(utter);
        }

        async function fetchAI(question) {
            const apiKey = keyInput.value.trim();
            if(!apiKey) return "Ошибка: Введите API ключ!";
            
            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "meta-llama/llama-3.1-8b-instruct:free",
                        messages: [{ role: "system", content: "Ты помощник на стриме. Отвечай кратко на русском." }, 
                                   { role: "user", content: question }]
                    })
                });
                const data = await res.json();
                return data.choices[0].message.content.trim();
            } catch(e) { return "Ошибка ИИ сессии."; }
        }

        function connect() {
            if (!currentChannel) return;
            if (ws) { ws.onclose = null; ws.close(); }

            ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

            ws.onopen = () => {
                ws.send(`PASS SCHMOOPIIE`);
                ws.send(`NICK justinfan${Math.floor(Math.random() * 99999)}`);
                ws.send(`JOIN #${currentChannel}`);
                led.className = 'led on';
                stTxt.textContent = `LIVE: ${currentChannel}`;
            };

            ws.onmessage = async (e) => {
                if (e.data.startsWith('PING')) { ws.send('PONG :tmi.twitch.tv'); return; }
                const match = e.data.match(/:(\w+)!.*PRIVMSG #\w+ :(.*)/);
                if (match) {
                    const user = match[1], msg = match[2].trim();
                    addMsg(user, msg);

                    if (msg.toLowerCase().startsWith('!ai')) {
                        const q = msg.slice(3).trim();
                        if (q) {
                            addMsg('🤖 AI', '⚡ Обработка...', 'ai');
                            const ans = await fetchAI(q);
                            chat.lastChild.innerHTML = `<b>🤖 AI</b> ${ans}`;
                            speak(ans, true);
                        }
                    } else {
                        speak(msg, false);
                    }
                }
            };

            ws.onclose = () => {
                led.className = 'led re';
                stTxt.textContent = 'РЕКОННЕКТ...';
                setTimeout(connect, 200);
            };
        }

        btn.addEventListener('click', () => {
            const ch = chInput.value.trim().toLowerCase();
            const key = keyInput.value.trim();
            if (ch && key) {
                currentChannel = ch;
                localStorage.setItem('_or_key', key);
                audioActive = true;
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
                addMsg('', `📡 Подключение к #${ch}...`, 'sys');
                connect();
            } else {
                alert("Введите канал и API ключ!");
            }
        });
    })();
</script>

</body>
</html>
