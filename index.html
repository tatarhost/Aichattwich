<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch AI CyberTTS</title>
    
    <!-- Используем другой надежный CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tmi.js/1.8.5/tmi.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0e0e10; color: #efeff1; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .cyber-app { max-width: 800px; width: 100%; background: #18181b; border: 1px solid #2d2d35; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .logo { font-weight: bold; font-size: 1.4rem; color: #9147ff; margin-right: auto; }
        .channel-control { display: flex; gap: 10px; background: #000; padding: 5px; border-radius: 30px; border: 1px solid #333; }
        .channel-control input { background: transparent; border: none; color: #fff; padding: 8px 15px; outline: none; width: 140px; }
        .connect-btn { background: #9147ff; border: none; color: #fff; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .connect-btn:hover { background: #772ce8; }
        .status { font-size: 0.8rem; display: flex; align-items: center; gap: 5px; }
        .led { width: 8px; height: 8px; border-radius: 50%; background: gray; }
        .led.online { background: #00ffcc; box-shadow: 0 0 8px #00ffcc; }
        .chat-window { background: #0a0a0c; height: 350px; border-radius: 12px; padding: 15px; overflow-y: auto; margin: 15px 0; border: 1px solid #222; display: flex; flex-direction: column; gap: 8px; }
        .msg { font-size: 0.9rem; line-height: 1.4; padding: 5px 10px; background: #1f1f23; border-radius: 8px; }
        .msg.ai { border-left: 3px solid #00ffcc; background: #141f1e; }
        .msg b { color: #bf94ff; }
        .msg.ai b { color: #00ffcc; }
        .controls { display: flex; gap: 20px; font-size: 0.85rem; color: #adadb8; }
    </style>
</head>
<body>

<div class="cyber-app">
    <div class="header">
        <div class="logo">◈ NEURO·TTS</div>
        <div class="channel-control">
            <input type="text" id="channelInput" placeholder="Ник канала" spellcheck="false">
            <button class="connect-btn" id="connectBtn">СТАРТ</button>
        </div>
        <div class="status">
            <div id="led" class="led"></div>
            <span id="statusTxt">ОФЛАЙН</span>
        </div>
    </div>

    <div class="controls">
        <label><input type="checkbox" id="ttsChat" checked> Чат</label>
        <label><input type="checkbox" id="ttsAI" checked> ИИ (!ai)</label>
    </div>

    <div id="chat" class="chat-window"></div>
</div>

<script>
    (function() {
        let client = null;
        let audioOk = false;

        const btn = document.getElementById('connectBtn');
        const input = document.getElementById('channelInput');
        const chatBox = document.getElementById('chat');
        const led = document.getElementById('led');
        const statusTxt = document.getElementById('statusTxt');

        function addMsg(user, text, isAI = false) {
            const d = document.createElement('div');
            d.className = 'msg' + (isAI ? ' ai' : '');
            d.innerHTML = `<b>${user}:</b> ${text}`;
            chatBox.appendChild(d);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function speak(text, isAI = false) {
            if (!audioOk) return;
            if (isAI && !document.getElementById('ttsAI').checked) return;
            if (!isAI && !document.getElementById('ttsChat').checked) return;

            // Чтобы голоса не накладывались
            if (isAI) window.speechSynthesis.cancel(); 

            const utter = new SpeechSynthesisUtterance(text.replace(/[^\p{L}\p{N}\s.,!?]/gu, ''));
            utter.lang = 'ru-RU';
            window.speechSynthesis.speak(utter);
        }

        async function connect() {
            // Проверка: загрузилась ли библиотека tmi
            if (typeof tmi === 'undefined') {
                alert("Ошибка: Библиотека Twitch (tmi.js) не загружена. Проверьте интернет или отключите AdBlock.");
                return;
            }

            const channel = input.value.trim().toLowerCase();
            if (!channel) return;

            audioOk = true;
            // "Будим" синтезатор речи
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));

            if (client) {
                try { await client.disconnect(); } catch(e) {}
            }

            client = new tmi.Client({
                connection: { secure: true, reconnect: true },
                channels: [channel]
            });

            statusTxt.textContent = "ПОДКЛЮЧЕНИЕ...";

            client.on('message', async (chan, userstate, message, self) => {
                if (self) return;
                const user = userstate['display-name'] || userstate.username;
                
                addMsg(user, message);

                if (message.toLowerCase().startsWith('!ai')) {
                    const q = message.slice(3).trim();
                    if (q) {
                        try {
                            const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(q)}?model=openai`);
                            const answer = await res.text();
                            addMsg('🤖 AI', answer, true);
                            speak(answer, true);
                        } catch(e) { addMsg('SYSTEM', 'Ошибка ИИ'); }
                    }
                } else {
                    speak(message, false);
                }
            });

            client.on('connected', () => {
                led.className = 'led online';
                statusTxt.textContent = "В СЕТИ: " + channel;
                addMsg('SYSTEM', 'Подключено к чату ' + channel);
            });

            try {
                await client.connect();
            } catch(e) {
                alert("Не удалось подключиться. Проверьте имя канала.");
                statusTxt.textContent = "ОШИБКА";
            }
        }

        btn.addEventListener('click', connect);
        input.addEventListener('keypress', (e) => e.key === 'Enter' && connect());
        
        addMsg('SYSTEM', 'Введите ник и нажмите СТАРТ');
    })();
</script>

</body>
</html>
