<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch AI CyberTTS · OpenRouter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #09090b; color: #efeff1; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .app-container {
            max-width: 850px;
            width: 100%;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(90deg, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            background: #09090b;
            padding: 4px;
            border-radius: 50px;
            border: 1px solid #3f3f46;
        }

        input {
            background: transparent;
            border: none;
            color: #fff;
            padding: 8px 16px;
            outline: none;
            width: 160px;
            font-size: 0.95rem;
        }

        button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 8px 22px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover { background: #2563eb; }

        .status-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #27272a;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
        }

        .led { width: 10px; height: 10px; border-radius: 50%; background: #52525b; transition: 0.2s; }
        .led.on { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .led.re { background: #ef4444; box-shadow: 0 0 10px #ef4444; }

        .chat-area {
            background: #09090b;
            height: 400px;
            border-radius: 16px;
            padding: 16px;
            overflow-y: auto;
            border: 1px solid #27272a;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 10px 14px;
            border-radius: 12px;
            background: #27272a;
            font-size: 0.95rem;
            line-height: 1.5;
            border-left: 4px solid #3b82f6;
            animation: fadeIn 0.2s ease;
        }

        .msg.ai { border-left-color: #10b981; background: #132a24; }
        .msg b { color: #60a5fa; margin-right: 5px; }
        .msg.ai b { color: #10b981; }
        .msg.sys { background: transparent; border: none; color: #71717a; font-size: 0.8rem; padding: 0 5px; }

        .settings { display: flex; gap: 20px; font-size: 0.9rem; color: #a1a1aa; margin-left: 5px; }
        input[type="checkbox"] { accent-color: #3b82f6; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo">◈ OPEN·NEURO</div>
        <div class="controls">
            <input type="text" id="chInput" placeholder="Ник канала..." spellcheck="false">
            <button id="startBtn">СТАРТ</button>
        </div>
        <div class="status-box">
            <div id="led" class="led"></div>
            <span id="stTxt">ОФЛАЙН</span>
        </div>
    </div>

    <div class="settings">
        <label><input type="checkbox" id="useChat" checked> Озвучка чата</label>
        <label><input type="checkbox" id="useAI" checked> Озвучка ИИ (!ai)</label>
    </div>

    <div id="chatBox" class="chat-area"></div>
    
    <div style="font-size: 0.7rem; color: #52525b; text-align: right; margin-top: 5px;">
        Native WebSocket & OpenRouter Llama 3.1
    </div>
</div>

<script>
    (function() {
        // --- ПАРАМЕТРЫ ---
        const OR_KEY = "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";
        const AI_MODEL = "meta-llama/llama-3.1-8b-instruct:free";

        let ws = null;
        let audioActive = false;
        let currentChannel = "";
        let lastSpeechWasAI = false;

        const btn = document.getElementById('startBtn');
        const input = document.getElementById('chInput');
        const chat = document.getElementById('chatBox');
        const led = document.getElementById('led');
        const stTxt = document.getElementById('stTxt');

        function addMsg(user, text, type = "") {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerHTML = type === 'sys' ? text : `<b>${user}:</b> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            if (chat.childNodes.length > 100) chat.removeChild(chat.firstChild);
        }

        function speak(text, isAI = false) {
            if (!audioActive) return;
            if (isAI && !document.getElementById('useAI').checked) return;
            if (!isAI && !document.getElementById('useChat').checked) return;

            // Приоритет ИИ: прерывает всё. Обычный чат не прерывает ИИ.
            if (isAI) window.speechSynthesis.cancel();
            else if (window.speechSynthesis.speaking && lastSpeechWasAI) return;

            const cleanText = text.replace(/(https?:\/\/[^\s]+)/g, 'ссылка').replace(/[^\p{L}\p{N}\s.,!?]/gu, '');
            const utter = new SpeechSynthesisUtterance(cleanText);
            utter.lang = 'ru-RU';
            utter.rate = 1.0;
            lastSpeechWasAI = isAI;
            window.speechSynthesis.speak(utter);
        }

        async function fetchAI(question) {
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OR_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href,
                        "X-Title": "Twitch AI Bot"
                    },
                    body: JSON.stringify({
                        model: AI_MODEL,
                        messages: [
                            { role: "system", content: "Ты помощник в чате Twitch. Отвечай кратко (до 2 предложений), на русском языке, весело и дружелюбно." },
                            { role: "user", content: question }
                        ]
                    })
                });
                const data = await response.json();
                return data.choices[0].message.content.trim();
            } catch (e) {
                console.error(e);
                return "Извините, нейросеть сейчас не может ответить.";
            }
        }

        function connect() {
            if (!currentChannel) return;

            if (ws) {
                ws.onclose = null; // Отключаем реконнект для старого сокета
                ws.close();
            }

            // Twitch WebSocket IRC
            ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

            ws.onopen = () => {
                const nick = 'justinfan' + Math.floor(Math.random() * 99999);
                ws.send(`PASS SCHMOOPIIE`);
                ws.send(`NICK ${nick}`);
                ws.send(`JOIN #${currentChannel}`);
                
                led.className = 'led on';
                stTxt.textContent = `LIVE: ${currentChannel}`;
                console.log("Connected to #" + currentChannel);
            };

            ws.onmessage = async (event) => {
                const data = event.data;
                
                // Обработка PING (Twitch требует PONG)
                if (data.startsWith('PING')) {
                    ws.send('PONG :tmi.twitch.tv');
                    return;
                }

                // Парсинг IRC сообщения
                const match = data.match(/:(\w+)!.*PRIVMSG #\w+ :(.*)/);
                if (match) {
                    const user = match[1];
                    const msg = match[2].trim();
                    addMsg(user, msg);

                    // Команда !ai
                    if (msg.toLowerCase().startsWith('!ai')) {
                        const q = msg.slice(3).trim();
                        if (q) {
                            addMsg('🤖 AI', '⚡ Думаю...', 'ai');
                            const ans = await fetchAI(q);
                            
                            // Заменяем "Думаю..." на реальный ответ
                            const lastAiMsg = chat.lastElementChild;
                            if (lastAiMsg && lastAiMsg.classList.contains('ai')) {
                                lastAiMsg.innerHTML = `<b>🤖 AI:</b> ${ans}`;
                            }
                            speak(ans, true);
                        }
                    } else {
                        speak(msg, false);
                    }
                }
            };

            ws.onclose = () => {
                led.className = 'led re';
                stTxt.textContent = 'RECONNECT...';
                // Моментальный реконнект (100мс)
                setTimeout(connect, 100);
            };

            ws.onerror = () => ws.close();
        }

        btn.addEventListener('click', () => {
            const val = input.value.trim().toLowerCase();
            if (val) {
                currentChannel = val;
                audioActive = true;
                // "Будим" TTS после клика
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
                addMsg('', `📡 Попытка подключения к #${val}...`, 'sys');
                connect();
            }
        });

        input.addEventListener('keypress', (e) => e.key === 'Enter' && btn.click());
    })();
</script>

</body>
</html>
