<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Twitch AI CyberTTS · GitHub Edition</title>
    <!-- Подключаем tmi.js через HTTPS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/dist/tmi.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0e0e10; color: #efeff1; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .cyber-app { max-width: 900px; width: 100%; background: #18181b; border: 1px solid #2d2d35; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); padding: 24px; }
        .header { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; margin-bottom: 22px; }
        .logo { font-weight: 700; font-size: 1.5rem; background: linear-gradient(135deg, #9147ff, #00ffcc); -webkit-background-clip: text; background-clip: text; color: transparent; margin-right: auto; }
        .channel-control { display: flex; gap: 8px; background: #0e0e10; padding: 4px 4px 4px 16px; border-radius: 48px; border: 1px solid #3a3a44; }
        .channel-control input { background: transparent; border: none; color: #fff; font-size: 1rem; outline: none; width: 150px; }
        .connect-btn { background: #9147ff; border: none; color: white; font-weight: bold; padding: 10px 20px; border-radius: 40px; cursor: pointer; transition: 0.3s; }
        .connect-btn:hover { background: #772ce8; transform: translateY(-1px); }
        .status-badge { display: flex; align-items: center; gap: 8px; background: #232329; padding: 8px 16px; border-radius: 40px; font-size: 0.85rem; }
        .led { width: 10px; height: 10px; border-radius: 50%; background: #4a4a55; }
        .led.online { background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }
        .led.loading { background: #ffcc00; box-shadow: 0 0 10px #ffcc00; }
        .settings-panel { display: flex; gap: 20px; margin-bottom: 15px; font-size: 0.9rem; color: #adadb8; }
        .chat-window { background: #0b0b0e; border-radius: 16px; padding: 15px; height: 400px; overflow-y: auto; border: 1px solid #2f2f3a; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        .message { padding: 8px 12px; border-radius: 12px; background: #1f1f26; font-size: 0.95rem; border-left: 3px solid #9147ff; animation: fadeIn 0.3s ease; }
        .message.ai { border-left-color: #00ffcc; background: #132026; }
        .message .author { font-weight: 700; color: #bf94ff; margin-right: 8px; }
        .message.ai .author { color: #00ffcc; }
        .info-bar { display: flex; justify-content: space-between; font-size: 0.8rem; color: #666; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="cyber-app">
    <div class="header">
        <div class="logo">◈ NEURO·TWITCH</div>
        <div class="channel-control">
            <input type="text" id="channelInput" placeholder="канал" spellcheck="false">
            <button class="connect-btn" id="connectBtn">ПОДКЛЮЧИТЬ</button>
        </div>
        <div class="status-badge">
            <span class="led" id="statusLed"></span>
            <span id="statusText">ОФЛАЙН</span>
        </div>
    </div>

    <div class="settings-panel">
        <label><input type="checkbox" id="ttsChat" checked> Озвучка чата</label>
        <label><input type="checkbox" id="ttsAI" checked> Озвучка ИИ</label>
    </div>

    <div id="chatWindow" class="chat-window"></div>

    <div class="info-bar">
        <span>GitHub Host Ready (WSS)</span>
        <span>Команда: <b>!ai [вопрос]</b></span>
    </div>
</div>

<script>
    (function() {
        let client = null;
        let audioActive = false;
        let lastSpeechWasAI = false;

        const btn = document.getElementById('connectBtn');
        const input = document.getElementById('channelInput');
        const chat = document.getElementById('chatWindow');
        const led = document.getElementById('statusLed');
        const statusTxt = document.getElementById('statusText');

        function log(name, text, isAI = false) {
            const div = document.createElement('div');
            div.className = 'message' + (isAI ? ' ai' : '');
            div.innerHTML = `<span class="author">${name}:</span> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function speak(text, isAI = false) {
            if (!audioActive) return;
            if (isAI && !document.getElementById('ttsAI').checked) return;
            if (!isAI && !document.getElementById('ttsChat').checked) return;

            // Очистка текста от ссылок и лишних символов
            const cleanText = text.replace(/(https?:\/\/[^\s]+)/g, 'ссылка').replace(/[^\p{L}\p{N}\s.,!?]/gu, '');
            
            if (isAI) window.speechSynthesis.cancel(); // ИИ прерывает всё
            else if (window.speechSynthesis.speaking && lastSpeechWasAI) return; // Чат не прерывает ИИ

            const utter = new SpeechSynthesisUtterance(cleanText);
            utter.lang = 'ru-RU';
            utter.rate = 1.0;
            lastSpeechWasAI = isAI;
            window.speechSynthesis.speak(utter);
        }

        async function askAI(question) {
            try {
                // Pollinations API (OpenAI-like model)
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(question)}?model=openai&seed=${Math.floor(Math.random()*1000)}`);
                return await res.text();
            } catch (e) { return "Проблемы с нейросетью..."; }
        }

        async function start() {
            const channel = input.value.trim().toLowerCase();
            if (!channel) return alert("Введите имя канала!");

            // 1. Активация аудио контекста
            audioActive = true;
            window.speechSynthesis.speak(new SpeechSynthesisUtterance('')); 

            // 2. Отключаем старый клиент, если был
            if (client) {
                await client.disconnect().catch(() => {});
                client = null;
            }

            // 3. Настройка клиента для GitHub Pages (обязательно secure: true)
            client = new tmi.Client({
                connection: {
                    secure: true,
                    reconnect: true
                },
                channels: [channel]
            });

            led.className = 'led loading';
            statusTxt.textContent = 'ПОДКЛЮЧЕНИЕ...';

            client.on('message', async (target, context, msg, self) => {
                if (self) return;
                const user = context['display-name'] || context.username;
                
                log(user, msg);

                if (msg.toLowerCase().startsWith('!ai')) {
                    const q = msg.slice(3).trim();
                    if (q) {
                        const answer = await askAI(q);
                        log('🤖 AI', answer, true);
                        speak(answer, true);
                    }
                } else {
                    speak(msg, false);
                }
            });

            client.on('connected', () => {
                led.className = 'led online';
                statusTxt.textContent = `ЧАТ: ${channel}`;
                log('SYSTEM', `Успешное подключение к ${channel}`);
            });

            client.on('disconnected', () => {
                led.className = 'led';
                statusTxt.textContent = 'ОФЛАЙН';
            });

            try {
                await client.connect();
            } catch (err) {
                console.error(err);
                log('ERROR', 'Ошибка подключения. Проверьте имя канала.');
                led.className = 'led';
            }
        }

        btn.addEventListener('click', start);
        input.addEventListener('keypress', (e) => e.key === 'Enter' && start());

        log('SYSTEM', 'Готов к запуску. Введите ник стримера.');
    })();
</script>

</body>
</html>
