<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEURO·STREAM v5.8 · Final Stability</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700&display=swap');

        :root {
            --accent: #007bff;
            --gpt-blue: #74aa9c;
            --error-red: #ff3366;
            --warn-orange: #ff9900;
            --bg: #030305;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; overflow: hidden; }

        /* СТАРТОВОЕ ОКНО */
        #welcomeModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .modal-btn {
            background: var(--accent); color: white; border: none; padding: 20px 40px; 
            border-radius: 50px; font-weight: 800; font-family: 'Orbitron'; cursor: pointer;
            box-shadow: 0 0 30px var(--accent); transition: 0.3s;
        }

        /* ПЛАШКА ПРЕДУПРЕЖДЕНИЯ */
        #speedPlaque {
            display: none; position: absolute; top: 10px; left: 10px; right: 10px;
            background: linear-gradient(90deg, var(--warn-orange), #ff4400);
            color: black; padding: 12px; border-radius: 12px; z-index: 1000;
            font-weight: 900; text-align: center; font-size: 0.7rem; line-height: 1.2;
        }
        #speedPlaque button {
            background: black; border: none; color: white; cursor: pointer; padding: 2px 8px; border-radius: 5px; margin-top: 5px;
        }

        .app-shell {
            max-width: 850px; width: 100%; background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(40px); border: 1px solid var(--border);
            border-radius: 30px; padding: 20px; box-shadow: 0 50px 120px rgba(0,0,0,0.9); position: relative;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.2rem; background: linear-gradient(90deg, #fff, var(--gpt-blue)); -webkit-background-clip: text; color: transparent; }

        .controls { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-bottom: 15px; }
        input { background: rgba(0,0,0,0.6); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 12px; outline: none; font-size: 0.9rem; }
        .btn-launch { background: var(--accent); border: none; color: white; padding: 0 20px; border-radius: 12px; font-weight: 800; cursor: pointer; }

        .sound-management { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .s-btn { 
            padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: #1a1a1e; color: #fff; font-size: 0.65rem; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }
        .s-btn.active { background: var(--error-red); border-color: #fff; }
        .btn-reset { grid-column: span 2; background: #333; }

        .chat-display { background: rgba(0,0,0,0.4); height: 320px; border-radius: 20px; padding: 15px; overflow-y: auto; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .message { padding: 10px 15px; border-radius: 15px; background: rgba(255,255,255,0.03); font-size: 0.85rem; line-height: 1.4; border-left: 3px solid var(--accent); }
        .message.ai { border-left-color: var(--gpt-blue); background: rgba(116, 170, 156, 0.08); }
        .message.err { border-left-color: var(--error-red); color: #ffb3b3; font-size: 0.75rem; }
        .message.sys { border-left: none; color: #666; font-size: 0.7rem; text-align: center; }

        .status-pill { display: flex; align-items: center; gap: 6px; font-size: 0.65rem; color: #666; }
        .led { width: 8px; height: 8px; border-radius: 50%; background: #444; }
        .led.on { background: var(--gpt-blue); box-shadow: 0 0 10px var(--gpt-blue); }
        .led.re { background: var(--error-red); }

        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body>

<div id="welcomeModal">
    <h1 style="font-family:'Orbitron'; color:var(--gpt-blue); margin-bottom: 20px;">NEURO·STREAM v5.8</h1>
    <button class="modal-btn" onclick="initApp()">ВОЙТИ В СИСТЕМУ</button>
</div>

<div id="speedPlaque">
    ⚠️ СЛИШКОМ БЫСТРЫЙ ЧАТ! ИИ МОЖЕТ ТОРМОЗИТЬ. РЕКОМЕНДУЕТСЯ МУТ ЧАТА.<br>
    <button onclick="closePlaque()">ЗАКРЫТЬ [X]</button>
</div>

<div class="app-shell">
    <div class="header">
        <div class="logo">◈ NEURO·IRC</div>
        <div class="status-pill">
            <div id="led" class="led"></div>
            <span id="stTxt">ОФЛАЙН</span>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="chInp" placeholder="Ник канала Twitch..." spellcheck="false">
        <button id="startBtn" class="btn-launch" onclick="startTwitch()">СТАРТ</button>
    </div>

    <div class="sound-management">
        <button class="s-btn" id="muteChatBtn" onclick="toggleMute('chat')">МУТ ЧАТА: ВЫКЛ</button>
        <button class="s-btn" id="muteAIBtn" onclick="toggleMute('ai')">МУТ ИИ: ВЫКЛ</button>
        <button class="s-btn btn-reset" onclick="stopSpeechNow()">🚫 ЗАТКНУТЬ ГОЛОС</button>
    </div>

    <div id="chatBox" class="chat-display"></div>

    <div style="font-size: 0.55rem; color: #333; text-align: center; text-transform: uppercase;">
        Powered by GPT-4o & Multi-Model Fallback · No Code Policy
    </div>
</div>

<script>
    let ws = null, audioEnabled = false, channel = "";
    let chatMuted = false, aiMuted = false;
    let msgCount = 0;

    function initApp() {
        audioEnabled = true;
        document.getElementById('welcomeModal').style.display = 'none';
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
    }

    function closePlaque() { document.getElementById('speedPlaque').style.display = 'none'; }
    function stopSpeechNow() { window.speechSynthesis.cancel(); }

    function toggleMute(target) {
        if(target === 'chat') {
            chatMuted = !chatMuted;
            document.getElementById('muteChatBtn').textContent = `МУТ ЧАТА: ${chatMuted ? 'ВКЛ' : 'ВЫКЛ'}`;
            document.getElementById('muteChatBtn').classList.toggle('active', chatMuted);
        } else {
            aiMuted = !aiMuted;
            document.getElementById('muteAIBtn').textContent = `МУТ ИИ: ${aiMuted ? 'ВКЛ' : 'ВЫКЛ'}`;
            document.getElementById('muteAIBtn').classList.toggle('active', aiMuted);
        }
        window.speechSynthesis.cancel();
    }

    function addMsg(user, text, type = "") {
        const div = document.createElement('div');
        div.className = 'message ' + type;
        div.innerHTML = type === 'sys' ? text : `<b>${user}:</b> ${text}`;
        const chatBox = document.getElementById('chatBox');
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        if (chatBox.childNodes.length > 35) chatBox.removeChild(chatBox.firstChild);
        msgCount++;
        return div;
    }

    setInterval(() => {
        if (msgCount > 10) document.getElementById('speedPlaque').style.display = 'block';
        msgCount = 0;
    }, 5000);

    function speak(text, isAI = false) {
        if (!audioEnabled || (isAI && aiMuted) || (!isAI && chatMuted)) return;
        
        if (isAI) window.speechSynthesis.cancel();
        else if (window.speechSynthesis.speaking) return; 

        const cleanText = text.replace(/(https?:\/\/[^\s]+)/g, '').replace(/[^\p{L}\p{N}\s.,!?]/gu, '');
        const utter = new SpeechSynthesisUtterance(cleanText);
        utter.lang = 'ru-RU';
        utter.rate = 1.05;
        window.speechSynthesis.speak(utter);
    }

    // Улучшенная функция запроса с обходом ошибки 502 (Bad Gateway)
    async function fetchAI(query) {
        const models = ['openai', 'mistral', 'p1']; 
        const seed = Math.floor(Math.random() * 999999);
        const sysPrompt = encodeURIComponent("Ты - дерзкий нейро-стример. Отвечай кратко, до 30 слов, на русском. Без кода.");

        for (let model of models) {
            try {
                const url = `https://text.pollinations.ai/${encodeURIComponent(query)}?model=${model}&system=${sysPrompt}&seed=${seed}`;
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 сек таймаут

                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);

                if (response.ok) {
                    const result = await response.text();
                    if (result && result.length > 2) return result.trim();
                }
            } catch (e) {
                console.warn(`Модель ${model} недоступна, пробуем следующую...`);
            }
        }
        return "Все системы ИИ перегружены. Попробуй позже!";
    }

    function startTwitch() {
        const val = document.getElementById('chInp').value.trim().toLowerCase();
        if (!val) return;
        channel = val;
        connect();
    }

    function connect() {
        if (ws) { ws.onclose = null; ws.close(); }
        ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

        ws.onopen = () => {
            ws.send(`PASS SCHMOOPIIE`);
            ws.send(`NICK justinfan${Math.floor(Math.random() * 99999)}`);
            ws.send(`JOIN #${channel}`);
            document.getElementById('led').className = 'led on';
            document.getElementById('stTxt').textContent = `LIVE: ${channel.toUpperCase()}`;
            addMsg('', `🟢 Связь установлена с #${channel}`, 'sys');
        };

        ws.onmessage = async (e) => {
            if (e.data.startsWith('PING')) {
                ws.send('PONG :tmi.twitch.tv');
                return;
            }

            const match = e.data.match(/:(\w+)!.*PRIVMSG #\w+ :(.*)/);
            if (match) {
                const user = match[1];
                const msg = match[2].trim();

                if (msg.toLowerCase().startsWith('!ai')) {
                    const q = msg.slice(3).trim();
                    if (q) {
                        const aiEl = addMsg('🤖 AI', '⚡ Мышление...', 'ai');
                        const ans = await fetchAI(q);
                        
                        if (ans.includes("перегружены")) aiEl.className = "message err";
                        aiEl.innerHTML = `<b>🤖 AI:</b> ${ans}`;
                        speak(ans, true);
                    }
                } else {
                    addMsg(user, msg);
                    speak(`${user} говорит: ${msg}`, false);
                }
            }
        };

        ws.onclose = () => {
            document.getElementById('led').className = 'led re';
            document.getElementById('stTxt').textContent = 'RECONNECT...';
            setTimeout(connect, 3000);
        };
    }
</script>
</body>
</html>
