<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURO·STREAM v3.1 · 2026 Stable</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700&display=swap');

        :root {
            --accent: #9147ff;
            --gemma-cyan: #00ffcc;
            --error-red: #ff3366;
            --bg: #030305;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; overflow-x: hidden; }

        .glow-bg { position: absolute; width: 40vw; height: 40vw; background: var(--accent); filter: blur(150px); opacity: 0.1; top: -10%; right: -10%; z-index: -1; }

        .app-shell {
            max-width: 900px;
            width: 100%;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 35px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            position: relative;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.8rem; letter-spacing: 2px; background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; color: transparent; }

        .resource-hub {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            padding: 15px;
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        .resource-hub a {
            flex: 1;
            text-align: center;
            text-decoration: none;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 12px;
            border-radius: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-tg { background: #229ED9; }
        .btn-max { background: #ff4500; }
        .resource-hub a:hover { transform: translateY(-3px); filter: brightness(1.2); }

        .inputs { display: grid; grid-template-columns: 1fr 2fr auto; gap: 15px; margin-bottom: 20px; }
        input {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            color: #fff;
            padding: 16px 20px;
            border-radius: 18px;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); }

        .btn-launch {
            background: var(--accent);
            border: none;
            color: #fff;
            font-weight: 800;
            padding: 0 35px;
            border-radius: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-launch:hover { background: #772ce8; box-shadow: 0 0 30px var(--accent); }

        .chat-display {
            background: rgba(0,0,0,0.3);
            height: 400px;
            border-radius: 25px;
            padding: 20px;
            overflow-y: auto;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .message {
            padding: 14px 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            font-size: 0.95rem;
            line-height: 1.6;
            border-left: 4px solid var(--accent);
            animation: slideIn 0.3s ease-out;
        }
        .message.ai {
            border-left-color: var(--gemma-cyan);
            background: rgba(0, 255, 204, 0.05);
        }
        .message.err { border-left-color: var(--error-red); background: rgba(255, 51, 102, 0.05); color: #ff99aa; font-family: monospace; font-size: 0.75rem; }
        
        .message b { color: var(--accent); margin-right: 10px; }
        .message.ai b { color: var(--gemma-cyan); }

        .footer { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: #666; }
        .status-pill { display: flex; align-items: center; gap: 8px; background: var(--glass); padding: 6px 15px; border-radius: 100px; border: 1px solid var(--border); }
        .led { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: 0.3s; }
        .led.on { background: var(--gemma-cyan); box-shadow: 0 0 12px var(--gemma-cyan); }
        .led.re { background: var(--error-red); box-shadow: 0 0 12px var(--error-red); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="glow-bg"></div>

<div class="app-shell">
    <div class="header">
        <div class="logo">◈ NEURO·IRC</div>
        <div class="status-pill">
            <div id="led" class="led"></div>
            <span id="stTxt">ОЖИДАНИЕ</span>
        </div>
    </div>

    <div class="resource-hub">
        <a href="https://t.me/+A9oqctCZC582ZmZl" target="_blank" class="btn-tg">Telegram Channel</a>
        <a href="https://max.ru/join/CLu9tJrFtmWQMFQ5Q3Yk5IcL_ElITI-dqusm4bsUa6g" target="_blank" class="btn-max">Max.ru Join</a>
    </div>

    <div class="inputs">
        <input type="text" id="chInp" placeholder="Канал Twitch" spellcheck="false">
        <input type="password" id="keyInp" placeholder="Вставьте API ключ..." spellcheck="false">
        <button id="startBtn" class="btn-launch">СТАРТ</button>
    </div>

    <div id="chatBox" class="chat-display"></div>

    <div class="footer">
        <label style="cursor: pointer;"><input type="checkbox" id="ttsOn" checked> Озвучка активна</label>
        <span>Model: <b style="color:var(--gemma-cyan)">Gemma 4 31B (Free)</b></span>
    </div>
</div>

<script>
    (function() {
        let ws = null, audio = false, channel = "", lastAI = false;
        const btn = document.getElementById('startBtn'),
              chInp = document.getElementById('chInp'),
              keyInp = document.getElementById('keyInp'),
              chat = document.getElementById('chatBox'),
              led = document.getElementById('led'),
              stTxt = document.getElementById('stTxt');

        keyInp.value = localStorage.getItem('_or_key_2026') || '';

        function addMsg(user, text, type = "") {
            const div = document.createElement('div');
            div.className = 'message ' + type;
            div.innerHTML = type === 'sys' ? text : `<b>${user}</b> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            if (chat.childNodes.length > 50) chat.removeChild(chat.firstChild);
        }

        function speak(text, isAI = false) {
            if (!audio || !document.getElementById('ttsOn').checked) return;
            if (isAI) window.speechSynthesis.cancel();
            else if (window.speechSynthesis.speaking && lastAI) return;
            const utter = new SpeechSynthesisUtterance(text.replace(/(https?:\/\/[^\s]+)/g, '').replace(/[^\p{L}\p{N}\s.,!?]/gu, ''));
            utter.lang = 'ru-RU'; lastAI = isAI;
            window.speechSynthesis.speak(utter);
        }

        async function fetchAI(q) {
            const key = keyInp.value.trim();
            if (!key) return { err: "Введите API ключ!" };

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": "https://github.com/", // Фикс для провайдеров
                        "X-Title": "NeuroStream 2026"
                    },
                    body: JSON.stringify({
                        model: "google/gemma-4-31b-it:free",
                        messages: [{ role: "system", content: "Краткий ответ на русском." }, 
                                   { role: "user", content: q }],
                        provider: { order: ["Google", "Vertex"], allow_fallbacks: true } // Принудительный выбор провайдеров Google
                    })
                });

                const data = await response.json();
                
                // Если провайдер вернул ошибку, пробуем упрощенный запрос
                if (data.error && data.error.message.includes("Provider")) {
                   console.log("Retry logic active...");
                   return { err: "Провайдер перегружен. Попробуйте снова через 5 секунд." };
                }

                if (data.error) return { err: data.error.message };
                return { text: data.choices[0].message.content.trim() };
            } catch(e) { 
                return { err: "Сетевой сбой. Проверьте VPN или ключ." }; 
            }
        }

        function connect() {
            if (!channel) return;
            if (ws) { ws.onclose = null; ws.close(); }
            ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

            ws.onopen = () => {
                ws.send(`PASS SCHMOOPIIE`);
                ws.send(`NICK justinfan${Math.floor(Math.random() * 99999)}`);
                ws.send(`JOIN #${channel}`);
                led.className = 'led on'; stTxt.textContent = `LIVE: ${channel.toUpperCase()}`;
                addMsg('', `📡 Канал #${channel} подключен.`, 'sys');
            };

            ws.onmessage = async (e) => {
                if (e.data.startsWith('PING')) { ws.send('PONG :tmi.twitch.tv'); return; }
                const m = e.data.match(/:(\w+)!.*PRIVMSG #\w+ :(.*)/);
                if (m) {
                    const u = m[1], msg = m[2].trim();
                    addMsg(u, msg);
                    if (msg.toLowerCase().startsWith('!ai')) {
                        const q = msg.slice(3).trim();
                        if (q) {
                            addMsg('🤖 Gemma 4', '⚡ Анализ...', 'ai');
                            const res = await fetchAI(q);
                            if (res.err) {
                                chat.lastChild.className = "message err";
                                chat.lastChild.innerHTML = `⚠️ ОШИБКА: ${res.err}`;
                            } else {
                                chat.lastChild.innerHTML = `<b>🤖 Gemma 4</b> ${res.text}`;
                                speak(res.text, true);
                            }
                        }
                    } else { speak(msg, false); }
                }
            };

            ws.onclose = () => {
                led.className = 'led re'; stTxt.textContent = 'RECONNECT...';
                setTimeout(connect, 200);
            };
        }

        btn.addEventListener('click', () => {
            const ch = chInp.value.trim().toLowerCase();
            const key = keyInp.value.trim();
            if (ch && key) {
                channel = ch;
                localStorage.setItem('_or_key_2026', key);
                audio = true;
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
                connect();
            } else { alert("Введите канал и ключ!"); }
        });
    })();
</script>
</body>
</html>
