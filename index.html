<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitch AI Mobile Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tmi.js/1.8.5/tmi.min.js"></script>
    <style>
        :root { --p: #9147ff; --bg: #0e0e10; --cyan: #00ffcc; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #18181b; padding: 10px; display: flex; gap: 5px; border-bottom: 2px solid var(--p); }
        input { flex: 1; padding: 12px; background: #000; border: 1px solid var(--p); color: white; border-radius: 5px; font-size: 16px; }
        button { padding: 10px; background: var(--p); border: none; color: white; border-radius: 5px; font-weight: bold; }
        .debug { font-size: 10px; background: #000; color: #0f0; padding: 5px; max-height: 40px; overflow: hidden; }
        #chat { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #1f1f23; padding: 10px; border-radius: 8px; border-left: 3px solid var(--p); animation: fadeIn 0.3s; }
        .msg.ai { border-left-color: var(--cyan); background: rgba(0,255,204,0.05); }
        .thinking { color: var(--cyan); font-style: italic; font-size: 0.9em; }
        .user { font-weight: bold; color: var(--p); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="debug" id="debug">Статус: ожидание запуска</div>

    <header>
        <input type="text" id="channel" placeholder="Ник стримера" translate="no" spellcheck="false">
        <button id="btn">ПУСК</button>
    </header>

    <div id="chat"></div>

    <script>
        const chat = document.getElementById('chat');
        const debug = document.getElementById('debug');
        const synth = window.speechSynthesis;
        let client = null;
        let chatHistory = [];

        function log(m) { debug.innerText = "Лог: " + m; console.log(m); }

        function speak(text, interrupt = false) {
            if (!synth) return;
            if (interrupt) synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ru-RU';
            synth.speak(u);
        }

        function addMessage(user, text, isAI = false, id = null) {
            const div = document.createElement('div');
            div.className = 'msg' + (isAI ? ' ai' : '');
            if (id) div.id = id;
            div.innerHTML = `<span class="user">${user}:</span> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        async function fetchAI(user, text) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000); // Тайм-аут 15 секунд

            // Берем только 5 последних сообщений для легкости запроса
            const context = chatHistory.slice(-5).map(h => h.t).join(". ");
            const prompt = `Это чат Твича. Контекст: ${context}. Вопрос от ${user}: ${text}. Ответь очень кратко (1-2 фразы).`;

            try {
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai&system=Отвечай на русском языке.`, {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error("Ошибка сервера");
                return await response.text();
            } catch (e) {
                clearTimeout(timeoutId);
                return e.name === 'AbortError' ? "Ошибка: ИИ слишком долго думал." : "Ошибка: не удалось связаться с ИИ.";
            }
        }

        document.getElementById('btn').onclick = function() {
            const channel = document.getElementById('channel').value.trim().toLowerCase();
            if (!channel) return;

            speak("Система активирована", true);
            if (client) client.disconnect();

            client = new tmi.Client({
                connection: { secure: true, reconnect: true },
                channels: [channel]
            });

            log("Подключение к " + channel + "...");

            client.on('message', async (target, context, msg, self) => {
                const user = context['display-name'];

                if (msg.startsWith('!ai')) {
                    const question = msg.replace('!ai', '').trim();
                    addMessage(user, msg);
                    
                    // Создаем временное сообщение-заглушку
                    const loadingId = 'loading-' + Date.now();
                    const loadingDiv = addMessage("Бот", '<span class="thinking">думает...</span>', true, loadingId);
                    
                    const answer = await fetchAI(user, question);
                    
                    // Заменяем "думает..." на ответ
                    loadingDiv.innerHTML = `<span class="user">AI:</span> ${answer}`;
                    speak(answer, true);
                } else {
                    addMessage(user, msg);
                    chatHistory.push({t: msg});
                    if (chatHistory.length > 10) chatHistory.shift();
                    if (window.speechSynthesis.speaking === false) speak(user + " пишет " + msg);
                }
            });

            client.on('connected', () => {
                log("ПОДКЛЮЧЕНО");
                addMessage("Система", "Бот готов к работе на канале " + channel, true);
            });

            client.connect().catch(e => log("Ошибка: " + e));
        };
    </script>
</body>
</html>
